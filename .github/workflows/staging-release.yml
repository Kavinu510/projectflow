name: Staging Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: staging-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Main
    uses: ./.github/workflows/reusable-validate.yml
    secrets:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SITE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      FERNFLOW_WORKSPACE_SLUG: ${{ secrets.STAGING_FERNFLOW_WORKSPACE_SLUG }}
      FERNFLOW_WORKSPACE_NAME: ${{ secrets.STAGING_FERNFLOW_WORKSPACE_NAME }}
      FERNFLOW_OWNER_EMAIL: ${{ secrets.STAGING_FERNFLOW_OWNER_EMAIL }}

  release-staging:
    name: Migrate, Deploy, And Smoke Test Staging
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SITE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      FERNFLOW_WORKSPACE_SLUG: ${{ secrets.STAGING_FERNFLOW_WORKSPACE_SLUG }}
      FERNFLOW_WORKSPACE_NAME: ${{ secrets.STAGING_FERNFLOW_WORKSPACE_NAME }}
      FERNFLOW_OWNER_EMAIL: ${{ secrets.STAGING_FERNFLOW_OWNER_EMAIL }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.STAGING_SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.STAGING_NETLIFY_SITE_ID }}
      CI_SMOKE_ENABLED: 'true'
      CI_SMOKE_TOKEN: ${{ secrets.STAGING_CI_SMOKE_TOKEN }}
      RELEASE_ENVIRONMENT: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.95.6

      - name: Validate staging environment variables
        run: node scripts/ci/assert-required-env.mjs build supabase netlify privateSmoke

      - name: Apply staging migrations
        run: npm run db:migrate:staging

      - name: Deploy staging to Netlify
        id: deploy
        run: node scripts/ci/netlify-deploy.mjs staging

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run staging HTTP smoke checks
        env:
          SMOKE_BASE_URL: ${{ steps.deploy.outputs.deploy_url }}
        run: npm run smoke:http

      - name: Run staging browser smoke checks
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.deploy.outputs.deploy_url }}
        run: npm run test:e2e

      - name: Write release manifest
        env:
          NETLIFY_DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
          NETLIFY_DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          NETLIFY_LOGS_URL: ${{ steps.deploy.outputs.logs_url }}
        run: node scripts/ci/write-release-manifest.mjs release-artifacts/staging-release.json

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: staging-release-manifest
          path: release-artifacts/staging-release.json

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-playwright-report
          path: playwright-report
          if-no-files-found: ignore
