name: Production Promotion

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'Commit SHA to promote to production'
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-target-sha:
    name: Verify Promotion SHA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify target SHA exists on main
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          git fetch origin main --depth=1
          git cat-file -e "$TARGET_SHA^{commit}"
          git merge-base --is-ancestor "$TARGET_SHA" "origin/main"

  validate:
    name: Validate Target SHA
    needs: verify-target-sha
    uses: ./.github/workflows/reusable-validate.yml
    with:
      git_ref: ${{ inputs.target_sha }}
    secrets:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SITE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
      FERNFLOW_WORKSPACE_SLUG: ${{ secrets.PROD_FERNFLOW_WORKSPACE_SLUG }}
      FERNFLOW_WORKSPACE_NAME: ${{ secrets.PROD_FERNFLOW_WORKSPACE_NAME }}
      FERNFLOW_OWNER_EMAIL: ${{ secrets.PROD_FERNFLOW_OWNER_EMAIL }}

  release-production:
    name: Promote To Production
    needs:
      - verify-target-sha
      - validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SITE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
      FERNFLOW_WORKSPACE_SLUG: ${{ secrets.PROD_FERNFLOW_WORKSPACE_SLUG }}
      FERNFLOW_WORKSPACE_NAME: ${{ secrets.PROD_FERNFLOW_WORKSPACE_NAME }}
      FERNFLOW_OWNER_EMAIL: ${{ secrets.PROD_FERNFLOW_OWNER_EMAIL }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.PROD_SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PROD_SUPABASE_DB_PASSWORD }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.PROD_NETLIFY_SITE_ID }}
      CI_SMOKE_ENABLED: 'true'
      CI_SMOKE_TOKEN: ${{ secrets.PROD_CI_SMOKE_TOKEN }}
      RELEASE_ENVIRONMENT: production
    steps:
      - name: Checkout release SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.95.6

      - name: Validate production environment variables
        run: node scripts/ci/assert-required-env.mjs build supabase netlify privateSmoke

      - name: Apply production migrations
        run: npm run db:migrate:prod

      - name: Deploy production to Netlify
        id: deploy
        run: node scripts/ci/netlify-deploy.mjs production

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run production HTTP smoke checks
        env:
          SMOKE_BASE_URL: ${{ steps.deploy.outputs.deploy_url }}
        run: npm run smoke:http

      - name: Run production browser smoke checks
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.deploy.outputs.deploy_url }}
        run: npm run test:e2e

      - name: Write release manifest
        env:
          NETLIFY_DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
          NETLIFY_DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          NETLIFY_LOGS_URL: ${{ steps.deploy.outputs.logs_url }}
          RELEASE_SHA: ${{ inputs.target_sha }}
        run: node scripts/ci/write-release-manifest.mjs release-artifacts/production-release.json

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: production-release-manifest
          path: release-artifacts/production-release.json

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-playwright-report
          path: playwright-report
          if-no-files-found: ignore
