name: PR Validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Check dependency changes
        uses: actions/dependency-review-action@v4

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    name: Validate FernFlow
    uses: ./.github/workflows/reusable-validate.yml
    secrets:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PREVIEW_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PREVIEW_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.PREVIEW_NEXT_PUBLIC_SITE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PREVIEW_SUPABASE_SERVICE_ROLE_KEY }}
      FERNFLOW_WORKSPACE_SLUG: ${{ secrets.PREVIEW_FERNFLOW_WORKSPACE_SLUG }}
      FERNFLOW_WORKSPACE_NAME: ${{ secrets.PREVIEW_FERNFLOW_WORKSPACE_NAME }}
      FERNFLOW_OWNER_EMAIL: ${{ secrets.PREVIEW_FERNFLOW_OWNER_EMAIL }}

  preview-verification:
    name: Deploy Preview And Smoke Test
    needs:
      - dependency-review
      - secret-scan
      - validate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PREVIEW_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PREVIEW_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.PREVIEW_NEXT_PUBLIC_SITE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PREVIEW_SUPABASE_SERVICE_ROLE_KEY }}
      FERNFLOW_WORKSPACE_SLUG: ${{ secrets.PREVIEW_FERNFLOW_WORKSPACE_SLUG }}
      FERNFLOW_WORKSPACE_NAME: ${{ secrets.PREVIEW_FERNFLOW_WORKSPACE_NAME }}
      FERNFLOW_OWNER_EMAIL: ${{ secrets.PREVIEW_FERNFLOW_OWNER_EMAIL }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.PREVIEW_NETLIFY_SITE_ID }}
      CI_SMOKE_ENABLED: 'true'
      CI_SMOKE_TOKEN: ${{ secrets.PREVIEW_CI_SMOKE_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deploy environment
        run: node scripts/ci/assert-required-env.mjs build netlify privateSmoke

      - name: Deploy preview to Netlify
        id: deploy
        run: node scripts/ci/netlify-deploy.mjs preview

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run HTTP smoke checks
        env:
          SMOKE_BASE_URL: ${{ steps.deploy.outputs.deploy_url }}
        run: npm run smoke:http

      - name: Run browser smoke checks
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.deploy.outputs.deploy_url }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pr-playwright-report
          path: playwright-report
          if-no-files-found: ignore
