# ──────────────────────────────────────────────────────────────────────────────
# FernFlow CI Pipeline
# Runs on every push and pull request to validate code quality and build.
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  ci:
    name: Lint → Type Check → Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js Setup ────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── Install Dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: Lint (ESLint + Prettier)
        run: npm run lint

      # ── Type Check ────────────────────────────────────────────────────────
      - name: Type check (tsc)
        run: npm run type-check

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build (next build)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FERNFLOW_WORKSPACE_SLUG: ${{ secrets.FERNFLOW_WORKSPACE_SLUG }}
          FERNFLOW_WORKSPACE_NAME: ${{ secrets.FERNFLOW_WORKSPACE_NAME }}
        run: npm run build
